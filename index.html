<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rattlesnake Collectables</title>

<style>
body{
  font-family:Arial;
  background:#0b0b0b;
  color:#fff;
  padding:20px;
}

/* CARD GRID */
.cards{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.card{
  position:relative;
  border-radius:14px;
  overflow:hidden;
}

.card img{
  width:100%;
  display:block;
}

/* 🔥 UPDATED LOCK STYLE */
.locked{
  filter:blur(6px) brightness(0.3);
  opacity:0.6;
}

.locked::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.65);
  border-radius:14px;
}

/* LOCK TEXT */
.lock-label{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  z-index:2;
  color:#fff;
  font-weight:700;
}

.lock-label span{
  display:block;
  font-size:12px;
  margin-top:4px;
  opacity:.8;
}
</style>
</head>

<body>

<h2>Collectables</h2>

<div class="cards">

<div class="card locked">
  <img src="Rattcard1.png">
  <div class="lock-label">🔒<span>Unlocks at 2.5km</span></div>
</div>

<div class="card locked">
  <img src="Rattcard2.png">
  <div class="lock-label">🔒<span>Unlocks at 5km</span></div>
</div>

<div class="card locked">
  <img src="Rattcard3.png">
  <div class="lock-label">🔒<span>Unlocks at 7.5km</span></div>
</div>

<div class="card locked">
  <img src="Rattcard4.png">
  <div class="lock-label">🔒<span>Unlocks at 10km</span></div>
</div>

</div>

</body>
</html>
